name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: {{APPLICATION}}-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: {{APPLICATION}}-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact: {{APPLICATION}}-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: {{APPLICATION}}-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: {{APPLICATION}}-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-s -w \
              -X main.version=${{ github.ref_name }} \
              -X main.revision=${{ github.sha }} \
              -X main.buildRFC3339=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o ${{ matrix.artifact }} \
            ./cmd/{{APPLICATION}}/main.go

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
