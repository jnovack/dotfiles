name: Release Binaries
# Builds cross-compiled binaries for linux/amd64, linux/arm64, and windows/amd64
# and attaches them to the GitHub release created by the semver tag.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  validate_tag:
    runs-on: ubuntu-latest
    outputs:
      is_valid: ${{ steps.check.outputs.is_valid }}
    steps:
      - id: check
        name: Validate full semver tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "is_valid=true" >> "${GITHUB_OUTPUT}"
          elif [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-((alpha|beta|pre|rc)([.-][0-9A-Za-z]+)*))?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "is_valid=true" >> "${GITHUB_OUTPUT}"
          else
            echo "is_valid=false" >> "${GITHUB_OUTPUT}"
            echo "Tag ${GITHUB_REF_NAME} is not a full semver tag like v1.3.0"
          fi

  create_release:
    runs-on: ubuntu-latest
    needs: validate_tag
    if: needs.validate_tag.outputs.is_valid == 'true'
    permissions:
      contents: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          NOTES=$(git log "${PREV}..HEAD" --no-merges --pretty=format:"* %s (%h)")
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${NOTES}" \
            --verify-tag

  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: create_release
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact: ${{ github.event.repository.name }}-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: ${{ github.event.repository.name }}-linux-arm64
          # Raspberry Pi Zero
          - goos: linux
            goarch: arm
            goarm: 6
            artifact: ${{ github.event.repository.name }}-linux-armv6
          # Raspberry Pi 2, 3, 4 (Legacy 32-bit OS)
          - goos: linux
            goarch: arm
            goarm: 7
            artifact: ${{ github.event.repository.name }}-linux-armv7
          # Legacy OSX Intel Processors
          - goos: darwin
            goarch: amd64
            artifact: ${{ github.event.repository.name }}-darwin-amd64
          # OSX M-Class Processors
          - goos: darwin
            goarch: arm64
            artifact: ${{ github.event.repository.name }}-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact: ${{ github.event.repository.name }}-windows-amd64.exe

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build \
            -ldflags "-s -w \
              -X main.version=${{ github.ref_name }} \
              -X main.revision=${{ github.sha }} \
              -X main.buildRFC3339=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            -o ${{ matrix.artifact }} \
            ./cmd/${{ github.event.repository.name }}/main.go

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" "${{ matrix.artifact }}"
